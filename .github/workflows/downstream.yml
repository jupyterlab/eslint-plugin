name: Downstream Integration Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  jupyterlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eslint-plugin
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install and build plugin
        run: |
          npm install
          npm run build

      - name: Clone JupyterLab
        uses: actions/checkout@v4
        with:
          repository: jupyterlab/jupyterlab
          path: jupyterlab

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install and build JupyterLab
        working-directory: jupyterlab
        run: |
          python -m pip install .
          python -m pip install "hatchling>=1.21.1"
          jlpm
          jlpm run build

      - name: Run integration lint check
        run: |
          npx eslint --config eslint.downstream.config.mjs \
            'jupyterlab/packages/*/src/**/*.ts' \
            --max-warnings=9999
        env:
          NODE_PATH: ./jupyterlab/node_modules

  notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eslint-plugin
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install and build plugin
        run: |
          npm install
          npm run build

      - name: Clone Notebook
        uses: actions/checkout@v4
        with:
          repository: jupyter/notebook
          path: notebook

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install and build notebook
        working-directory: notebook
        run: |
          python -m pip install .
          jlpm
          jlpm run build

      - name: Run integration lint check
        run: |
          npx eslint --config eslint.downstream.config.mjs \
            'notebook/packages/*/src/**/*.ts' \
            --max-warnings=9999
        env:
          NODE_PATH: ./notebook/node_modules
